openapi: 3.0.0
info:
  title: 滴滴国际化外卖开放平台
  description: 滴滴国际化外卖开放平台开发者文档
  termsOfService: 'https://openapi.didi-food.com/terms'
  contact:
    email: didiOpenApiSupport@didiglobal.com
  version: 0.0.1
servers:
  -
    url: 'https://openapi.didi-food.com'
    description: 'OpenApi host'
paths:
  /v1/auth/authorizationpage/getUrl:
    post:
      tags:
        - Auth
      summary: 'Get Authorization Web Page'
      description: 'The Get Authorization Web Page endpoint provides the developer the ability to get DiDi''s bind store self-service web page.'
      operationId: 'B\Controller\V1\Auth\Authorizationpage::getUrlAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - app_id
                - app_shop_id
              properties:
                app_id:
                  description: 'ID for an app on Didi-food.'
                  type: integer
                  example: '3458764610605350993'
                app_shop_id:
                  description: menus.
                  type: string
                  example: '1234'
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: string, example: ['https://didi-food.com/en-US/store/ui-sdk/authorization?appId=5764607636157235207&appShopId=aaa'] } }, type: object }
  /v1/auth/authtoken/get:
    get:
      tags:
        - Auth
      summary: 'Get AuthToken'
      description: 'This api provides the ability to get the auth token for the shop specified with app_shop_id. If you don''t have a auth token yet or the auth token expired, please call auth/authtoken/refresh api first.'
      operationId: 'B\Controller\V1\Auth\Authtoken::getAction'
      parameters:
        -
          name: app_id
          in: query
          description: 'ID for an app on Didi-food.'
          required: true
          schema:
            type: integer
        -
          name: app_secret
          in: query
          description: 'The secret key for app_id.'
          required: true
          schema:
            type: string
            maxLength: 50
            minLength: 1
        -
          name: app_shop_id
          in: query
          description: 'ID for an shop on your system.'
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, properties: { app_id: { description: 'ID for an app on Didi-food.', type: integer }, app_shop_id: { description: 'ID for an shop on your system.', type: string }, auth_token: { description: 'The secret key for the shop.', type: string }, token_expiration_time: { description: 'The expiration time of the auth token. If the auth token expired, you can create another with auth/authtoken/refresh api.', type: integer } }, type: object } }, type: object }
  /v1/auth/authtoken/refresh:
    get:
      tags:
        - Auth
      summary: 'Refresh AuthToken'
      description: 'This api always generate a new token, and you need to get it with auth/authtoken/get api'
      operationId: 'B\Controller\V1\Auth\Authtoken::refreshAction'
      parameters:
        -
          name: app_id
          in: query
          description: 'ID for an app on Didi-food.'
          required: true
          schema:
            type: integer
        -
          name: app_secret
          in: query
          description: 'The secret key for app_id.'
          required: true
          schema:
            type: string
            maxLength: 50
            minLength: 1
        -
          name: app_shop_id
          in: query
          description: 'ID for an shop on your system.'
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: boolean, default: true } }, type: object }
  /v1/item/item/upload:
    post:
      tags:
        - Item
      summary: 'Upload Store Menu'
      description: "This api will upload the menu to the store, and you can verify the result with [Get store menu details](#Get Store Menu Details) api.\n\n     *  support content_with_sub_item in item, but will ignore content_with_sub_item in sub_item"
      operationId: 'B\Controller\V1\Item\Item::uploadAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - menus
                - categories
                - items
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ODQ5ZDBkZDdjN2Q1NzM4NzcxNTM3Mjg3ODNjMzRhMmE=
                menus:
                  description: menus.
                  type: array
                  items: { $ref: '#/components/schemas/MenuStruct' }
                categories:
                  description: categories.
                  type: array
                  items: { $ref: '#/components/schemas/CateStruct' }
                items:
                  description: items.
                  type: array
                  items: { $ref: '#/components/schemas/ItemStruct' }
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: array, items: { type: string }, example: ['3458764778045113577', '3458764778162554089'] } }, type: object }
  /v1/item/item/uploadV2:
    post:
      tags:
        - Item
      summary: 'Upload Store Menu v2'
      description: "This api support multi level item, and it will return immediately with a taskId and upload the menu with an async task in background,\n     *     with the task id you can call the item/item/getMenuTaskInfo to get the detail.\n     *     And you will also receive a callback with event uploadMenuTaskStatus when the task finished in background.\n     *     After the api is successfully called, please call the item/item/list api to check the upload result.\n\n     *  support nest of content_with_sub_item for no more than six level"
      operationId: 'B\Controller\V1\Item\Item::uploadV2Action'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - menus
                - categories
                - items
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ODQ5ZDBkZDdjN2Q1NzM4NzcxNTM3Mjg3ODNjMzRhMmE=
                menus:
                  description: menus.
                  type: array
                  items: { $ref: '#/components/schemas/MenuStruct' }
                categories:
                  description: categories.
                  type: array
                  items: { $ref: '#/components/schemas/CateStruct' }
                items:
                  description: items.
                  type: array
                  items: { $ref: '#/components/schemas/ItemStruct' }
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: object, items: { $ref: '#/components/schemas/TaskInfo' } } }, type: object }
  /v1/item/item/getMenuTaskInfo:
    get:
      tags:
        - Item
      summary: 'Get Store Menu Status'
      description: 'This api provides the ability to query the menu upload status of uploadV2.'
      operationId: 'B\Controller\V1\Item\Item::getMenuTaskInfoAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
        -
          name: task_id
          in: query
          description: 'The task id return in item/item/uploadV2.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: 'Get Store Menu Upload Status', type: object, allOf: [{ $ref: '#/components/schemas/TaskInfo' }, { properties: { operationList: { description: 'operation aggregate info List', type: array, items: { $ref: '#/components/schemas/UploadMenuAggregateOperationInfo' } } }, type: object }, { properties: { appShopID: { description: 'Get Store Menu Upload Status', type: string } }, type: object }] } }, type: object }
  /v1/item/item/list:
    get:
      tags:
        - Item
      summary: 'Get Store Menu Details'
      description: 'This Get Store Menu Details endpoint provides the ability to get the menu.'
      operationId: 'B\Controller\V1\Item\Item::listAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: 'Get Store Menu Details', properties: { menus: { description: 'List of the store’s menus. Currently, only one menu is supported. Multiple menus need to be mapped to 1 menu. Multiple menus shall be mapped to 1 menu, categories’ sequence shall be uploaded in accordance to the categories’ sequence, need to make sure that the categories’ sequence is correct.', type: array, items: { $ref: '#/components/schemas/MenuStruct' } }, categories: { description: 'List of the store’s menu categories. Currently, one category can only belong to one menu. The sequence of the items under the same category must be uploaded in the same sequence. Please make sure that the item sequence is correct.', type: array, items: { $ref: '#/components/schemas/CateStruct' } }, items: { description: 'List of the store’s items.Current item can only belong to one category or no category. The sequence of the content under the same item must be uploaded in the same sequence. Please make sure that the content sequence is correct.', type: array, items: { $ref: '#/components/schemas/ItemStruct' } } }, type: object } }, type: object }
  /v1/item/item/update:
    post:
      tags:
        - Item
      summary: 'Update One Item'
      description: 'This update one item endpoint provides the ability to update items.'
      operationId: 'B\Controller\V1\Item\Item::updateAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemStruct'
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: boolean, default: true } }, type: object }
  /v1/item/item/updateItemStatus:
    post:
      tags:
        - Item
      summary: 'Update Item Status'
      description: 'This update one item endpoint provides the ability to update item status.'
      operationId: 'B\Controller\V1\Item\Item::updateItemStatusAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - app_item_id
                - status
              properties:
                app_item_id:
                  description: 'ID for the item, provided by the restaurant or POS.Map directly.'
                  type: string
                  example: Hamburguesas01
                status:
                  description: 'status:1:available;2:Unavailable.'
                  type: integer
                  example: 1
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: boolean, default: true } }, type: object }
  /v1/order/apply/cancel:
    post:
      tags:
        - Order
      summary: 'agree or refuse customer''s apply to cancel an order when accept by the shop'
      description: 'This api allows developer to agree or refuse a cancel apply'
      operationId: 'B\Controller\V1\Order\Apply::cancelAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - order_id
                - apply_id
                - agree
                - reason_id
                - reason
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                order_id:
                  description: 'id of the order'
                  type: integer
                  example: 2352921557674426622
                apply_id:
                  description: 'id of the apply'
                  type: integer
                  example: 2352921557674426621
                agree:
                  description: 'agree if it is true, or refuse'
                  type: boolean
                  example: true
                reason:
                  description: 'refuse reason'
                  type: string
                  example: 'already prepared'
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, properties: { '': {  } }, type: object } }, type: object }
  /v1/order/apply/refund:
    post:
      tags:
        - Order
      summary: 'agree or refuse customer''s apply to refund of an order when missing items after it finished'
      description: 'This api allows developer to agree or refuse a refund apply'
      operationId: 'B\Controller\V1\Order\Apply::refundAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - order_id
                - agree
                - apply_id
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                order_id:
                  description: 'id of the order'
                  type: integer
                  example: 2352921557674426622
                apply_id:
                  description: 'id of the apply'
                  type: integer
                  example: 2352921557674426621
                agree:
                  description: 'agree if it is true, or refuse'
                  type: boolean
                  example: true
                custom_reason:
                  description: 'custom refuse reason'
                  type: string
                  example: 'already prepare'
                base_reason_id:
                  description: 'pick from reason list'
                  type: string
                  example: 'already prepare'
                base_reason:
                  description: 'pick from reason list'
                  type: string
                  example: 'already prepare'
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: object } }, type: object }
  /v1/order/order/detail:
    get:
      tags:
        - Order
      summary: 'Get Order Details'
      description: 'This Get Order Details endpoint allows a developer pull the order details.'
      operationId: 'B\Controller\V1\Order\Order::detailAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
        -
          name: order_id
          in: query
          description: 'ID for an order on Didi-food.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { $ref: '#/components/schemas/OrderModel' } }, type: object }
  /v1/order/order/confirm:
    post:
      tags:
        - Order
      summary: 'Confirm Order'
      description: 'This Confirm Order endpoint allows a developer to confirm the order.'
      operationId: 'B\Controller\V1\Order\Order::confirmAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - order_id
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                order_id:
                  description: 'ID for order on Didi-food.'
                  type: integer
                  example: 2352921557674426622
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: boolean, default: true } }, type: object }
  /v1/order/order/cancel:
    post:
      tags:
        - Order
      summary: 'Cancel Order'
      description: 'This Cancel Order endpoint allows a developer to cancel the order.'
      operationId: 'B\Controller\V1\Order\Order::cancelAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - order_id
                - reason_id
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                order_id:
                  description: 'ID for order on Didi-food.'
                  type: integer
                  example: 2352921557674426622
                reason_id:
                  description: "An object that contains detailed information about rejected orders.\n                            enums: 1010,1020,1030,1040,1050,1060,1080"
                  type: integer
                  example: 1010
                reason:
                  description: 'Reasons or precautions for rejection.'
                  type: string
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: boolean, default: true } }, type: object }
  /v1/order/order/ready:
    get:
      tags:
        - Order
      summary: 'Order Ready'
      description: 'The Order Ready endpoint allows the developer to indicate that the meal is prepared.'
      operationId: 'B\Controller\V1\Order\Order::readyAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key to the shop.'
          required: true
          schema:
            type: string
        -
          name: order_id
          in: query
          description: 'The id of the order.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
  /v1/order/order/delivered:
    get:
      tags:
        - Order
      summary: 'Order Delivered'
      description: 'The Order Delivered endpoint allows the developer to indicate that the delivery has been completed. Only used for self-delivery orders.'
      operationId: 'B\Controller\V1\Order\Order::deliveredAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key to the shop.'
          required: true
          schema:
            type: string
        -
          name: order_id
          in: query
          description: 'The id of the order.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
  /v1/shop/apply/set:
    post:
      tags:
        - Shop
      summary: 'set whether receive notifications of customer''s apply to cancel an order when accept by the shop or refund when missing items in an order after it finished'
      description: 'This api allows developer to set whether receive cancel apply or refund apply notifications. By default, didi cs team will take charge of these issues.'
      operationId: 'B\Controller\V1\Shop\Apply::setAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - receive_cancel_apply
                - receive_refund_apply
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                receive_cancel_apply:
                  description: 'set to receive cancel apply notification; 0 not receive, 1 receive'
                  type: integer
                  example: 1
                receive_refund_apply:
                  description: 'set to receive refund apply notification; 0 not receive, 1 receive'
                  type: integer
                  example: 1
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: object } }, type: object }
  /v1/shop/deliveryArea/add:
    post:
      tags:
        - DeliveryArea
      summary: 'add delivery area for shop'
      description: 'This api allows developer to add delivery area conf.'
      operationId: 'B\Controller\V1\Shop\Deliveryarea::addAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - area_type
                - avg_delivery_eta
                - enable_time_list
                - price
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                area_type:
                  description: 'draw a circle delivery area with the shop as center by radius or draw a polygon with points,  0: circle, 1: polygon'
                  type: integer
                  example: 0
                radius:
                  description: 'required when areaType is circle'
                  type: integer
                  example: 5
                points:
                  description: 'required when areaType is polygon'
                  type: array
                  items: { $ref: '#/components/schemas/POI' }
                  example: 5
                avg_delivery_eta:
                  description: 'seconds of average delivery eta'
                  type: integer
                  example: 300
                enable_time_list:
                  description: ''
                  type: array
                  items: { $ref: '#/components/schemas/EnableTime' }
                price:
                  description: 'set in the lowest denomination (e.g., cents for MX currency, not Peso).'
                  type: integer
                  example: 500
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, properties: { area_id_list: { description: 'id of the created delivery area', type: array, items: { type: integer } } }, type: object } }, type: object }
  /v1/shop/deliveryArea/list:
    get:
      tags:
        - DeliveryArea
      summary: 'get all delivery area for shop'
      description: 'This api allows developer to get all delivery area conf.'
      operationId: 'B\Controller\V1\Shop\Deliveryarea::listAction'
      parameters:
        -
          name: auth_token
          in: query
          description: 'The secret key for the shop.'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, type: object } }, type: object }
  /v1/shop/deliveryArea/update:
    post:
      tags:
        - DeliveryArea
      summary: 'update delivery area for shop'
      description: 'This api allows developer to update delivery area conf.'
      operationId: 'B\Controller\V1\Shop\Deliveryarea::updateAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - area_id_list
                - areaType
                - avg_delivery_eta
                - enable_time_list
                - price
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                area_id_list:
                  description: 'area id list, you can get them from deliveryArea/list endpoint'
                  type: array
                  items: { type: integer }
                areaType:
                  description: 'draw a circle delivery area with the shop as center by radius or draw a polygon with points,  0: circle, 1: polygon'
                  type: integer
                  example: 0
                radius:
                  description: 'required when areaType is circle'
                  type: integer
                  example: 5
                points:
                  description: 'required when areaType is polygon'
                  type: array
                  items: { $ref: '#/components/schemas/POI' }
                  example: 5
                avg_delivery_eta:
                  description: 'seconds of average delivery eta'
                  type: integer
                  example: 300
                enable_time_list:
                  description: ''
                  type: array
                  items: { $ref: '#/components/schemas/EnableTime' }
                price:
                  description: 'set in the lowest denomination (e.g., cents for MX currency, not Peso).'
                  type: integer
                  example: 500
              type: object
      responses:
