  /v1/shop/shop/setconfirmmethod:
    post:
      tags:
        - Shop
      summary: 'Set Shop Confirmmethod'
      description: 'This API allows the developer to set the shop''s order_confirm_method. If order_confirm_method is BAPP, both DiDi/99 Food''s APP and your POS system can confirm new orders, but DiDi/99 Food''s  APP must remain online. If order_confirm_method is OPENAPI, Only your POS system can confirm new orders, and the DiDi/99 Food''s APP does not need to be online. If the store is unbound, we will change the ordering method to BAPP by default.'
      operationId: 'B\Controller\V1\Shop\Shop::setconfirmmethodAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - order_confirm_method
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                order_confirm_method:
                  description: 'Shop confirmmethod:1 BAPP ,2 OPENAPI'
                  type: integer
                  example: 1
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, properties: { order_confirm_method: { description: 'true if set successfully, false if failed', type: boolean, example: true } }, type: object } }, type: object }
