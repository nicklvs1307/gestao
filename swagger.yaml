  /v1/shop/shop/setStatus:
    post:
      tags:
        - Shop
      summary: 'Set Shop Status And Online-Switch'
      description: 'This api allows developer to set the shop''s biz_status and online-switch. If biz_status is offline, this shop will never be online until the biz_status set to online with this api or be online from didi''s app manually. Online switch will only be enabled when biz_status is online.'
      operationId: 'B\Controller\V1\Shop\Shop::setStatusAction'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - auth_token
                - biz_status
                - auto_switch
              properties:
                auth_token:
                  description: 'The secret key to the shop.'
                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                biz_status:
                  description: 'Business status:1 online,2 offline'
                  type: integer
                  example: 1
                auto_switch:
                  description: 'if biz_status is offline, it will be disabled no matter what the value is, it only enabled when biz_status is online. 1 for set store online automatically, order release is enabled.2 for set store offline automatically, order release is closed.3 for set store online and offline automatically，order release is enabled.'
                  type: integer
                  example: 1
              type: object
      responses:
        '200':
          description: 'successful operation'
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/StandardResponse' }
                  - { properties: { data: { description: data, properties: { biz_status: { description: 'true if biz_status is online, false if offline', type: boolean, example: true }, auto_switch: { description: 'true if auto_switch is enabled, false if disabled', type: boolean, example: true } }, type: object } }, type: object }
  /v1/shop/shop/update:
    post:
      tags:
        - Shop
      summary: 'Update Shop Basic Information'
      description: 'This Update Shop Basic Infomation endpoint allows a developer to update the shop''s basic information: shop logo, shop images, phone, business hours, and mealtime.'
      operationId: 'B\Controller\V1\Shop\Shop::updateAction'
