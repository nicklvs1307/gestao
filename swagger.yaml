components:
  schemas:
    TaskInfo:
      title: 'task model'
      description: TaskInfo
      required:
        - taskID
        - createTime
        - status
        - message
      properties:
        taskID:
          description: 'used in item/item/getMenuTaskInfo and callback api with event menuUploadStatus'
          type: integer
          example: 3458764695188406330
        createTime:
          description: 'create time of the task'
          type: integer
          example: 1608273772
        status:
          description: 'task status; 0:waiting; 1:success; 2:failed; 3:waitRetry 4:running'
          type: integer
          example: 0
        message:
          description: 'desc of status'
          type: string
          example: waiting
      type: object
    UploadMenuAggregateOperationInfo:
      title: 'operation aggregate info'
      description: UploadMenuAggregateOperationInfo
      properties:
        operationType:
          description: 'menuCreate, menuUpdate, cateCreate, cateUpdate, cateDel, itemCreate, itemUpdate, itemDel, imageUrlCheck, itemSoldInfoIntl, itemSoldInfo'
          type: string
        successList:
          description: 'success operation id, appMenuID, appCateID, appItemID, etc...'
          type: array
          items:
            type: string
        failedList:
          description: ''
          type: array
          items:
            $ref: '#/components/schemas/UploadMenuOperationInfo'
      type: object
    UploadMenuOperationInfo:
      title: 'operation info'
      description: UploadMenuOperationInfo
      properties:
        operationType:
          description: 'menuCreate, menuUpdate, cateCreate, cateUpdate, cateDel, itemCreate, itemUpdate, itemDel, imageUrlCheck, itemSoldInfoIntl, itemSoldInfo'
          type: string
        status:
          description: '0 failed'
          type: integer
        message:
          description: 'error for current operation'
          type: string
        createTime:
          description: 'operation time'
          type: integer
        menuID:
          description: 'Get Store Menu Upload Status'
          type: integer
        appMenuID:
          description: 'Get Store Menu Upload Status'
          type: string
        menuName:
          description: 'Get Store Menu Upload Status'
          type: string
        categoryID:
          description: 'Get Store Menu Upload Status'
          type: integer
        appCategoryID:
          description: 'Get Store Menu Upload Status'
          type: string
        categoryName:
          description: 'Get Store Menu Upload Status'
          type: string
        itemID:
          description: 'Get Store Menu Upload Status'
          type: integer
        appItemID:
          description: 'Get Store Menu Upload Status'
          type: string
        itemName:
          description: 'Get Store Menu Upload Status'
          type: string
        itemImageURL:
          description: 'Get Store Menu Upload Status'
          type: string
      type: object
    POI:
      title: poi
      description: 'lat and lng of a location'
      required:
        - lat
        - lng
      properties:
        lat:
          type: number
          example: 33.670702244105
        lng:
          type: number
          example: 135.5216506
      type: object
    EnableTime:
      title: 'enable time'
      description: 'valid time for delivery area'
      required:
        - start
        - end
      properties:
        start:
          type: string
          example: '10:50'
        end:
          type: string
          example: '14:00'
      type: object
    AreaGroup:
      title: 'area group'
      description: 'delivery area list'
      properties:
        area_id_list:
          type: array
          items:
            type: integer
        create_ts:
          type: integer
          example: 1628164699
        area_index:
          type: integer
          example: 0
        avg_delivery_eta:
          type: integer
          example: 400
        enable_time_list:
          type: array
          items:
            $ref: '#/components/schemas/EnableTime'
        display_enable_times:
          type: string
          example: '11:50-12:00'
        points:
          type: array
          items:
            $ref: '#/components/schemas/POI'
        price:
          type: integer
          example: 400
        radius:
          type: integer
          example: 0
      type: object
    UploadV3ItemStruct:
      title: 'item struct'
      description: 'item struct for upload v3'
      required:
        - app_item_id
        - item_name
        - price
        - is_sold_separately
      properties:
        app_item_id:
          description: 'ID for the item, provided by the restaurant or POS. Map directly.'
          type: string
          example: '1001_001'
        app_external_id:
          description: 'Reserved for the restaurant’s use, e.g. for POS integrations.'
          type: string
          example:
            key: value
        item_name:
          description: 'Item name to be displayed. The length is limited to 50.'
          type: string
          maxLength: 50
          example: sandwich
        short_desc:
          description: 'An optional description for the Category. The length is limited to 300.'
          type: string
          maxLength: 300
          example: 'very very delicious'
        head_img:
          description: 'The image url, char length <= 300'
          type: string
          example: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Ruben_sandwich.jpg/600px-Ruben_sandwich.jpg'
        sold_info_intl:
          type: array
          items:
            $ref: '#/components/schemas/SoldInfoIntl'
        price:
          description: 'set in the lowest denomination (e.g., cents for MX currency, not Peso)'
          type: integer
        is_sold_separately:
          description: 'show in didi food app as root item if it''s true, or only display when it is contains by some modifier group'
          type: boolean
      type: object
    UploadV3MgStruct:
      title: 'modifier group struct'
      description: 'modifier group struct for upload v3'
      required:
        - app_modifier_group_id
        - modifier_group_name
        - app_mg_items
      properties:
        app_modifier_group_id:
          description: 'ID for the mg, provided by the restaurant or POS.'
          type: string
          example: '90001'
        app_external_id:
          description: 'Reserved for the restaurant’s use, e.g. for POS integrations.'
          type: string
