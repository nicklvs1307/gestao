                  type: string
                  example: ZGQ5ZjVlZGUyYmFhNDM2ZmE0ZDA5OTE5ZjI1YzBhNjU=
                shop_phone:
                  description: ''
                  type: string
                  example: '[{"callingCode":52,"phone":15011498822,"type":0}]'
                biz_day_time:
                  description: ''
                  type: string
                  example: '[{"bizDay":[1,2,3,4,5,6,7],"bizTime":[{"begin":"00:00","end":"23:59"}]}]'
