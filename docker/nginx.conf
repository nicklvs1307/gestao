server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Bot detection - detectaUser-Agent
    set $is_bot "0";
    if ($http_user_agent ~* "WhatsApp") { set $is_bot "1"; }
    if ($http_user_agent ~* "facebookexternalhit") { set $is_bot "1"; }
    if ($http_user_agent ~* "TwitterBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "TelegramBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "Slackbot") { set $is_bot "1"; }
    if ($http_user_agent ~* "LinkedInBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "Discordbot") { set $is_bot "1"; }

    # Root path - faz proxy para preview se for bot, senão serve SPA
    location = / {
        # Se for bot, faz proxy para /preview mantendo a URL original
        if ($is_bot = "1") {
            rewrite ^ /preview break;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Bot-Detected "true";
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Preview endpoint - devuelve HTML con OG meta tags para bots
    location /preview {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bot-Detected "true";
    }

    # API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback - cualquier otra ruta sirve index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}