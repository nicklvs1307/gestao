server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Bot detection via map - defined outside locations
    map $http_user_agent $is_bot {
        ~WhatsApp 1;
        ~facebookexternalhit 1;
        ~TwitterBot 1;
        ~TelegramBot 1;
        ~Slackbot 1;
        ~LinkedInBot 1;
        ~Discordbot 1;
        default 0;
    }

    # Root - serve SPA para humanos, proxy para bots
    location = / {
        # Para bots, faz proxy para /preview
        if ($is_bot = 1) {
            return 301 /preview$is_args;
        }
        # Para humanos, serve SPA
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Preview endpoint - retorna HTML com OG meta tags
    location /preview {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bot-Detected "true";
    }

    # Login/Admin pages - serve SPA
    location /login {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /admin {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /dashboard {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /order-status {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}