server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Root - serve SPA normally, redirect bots to /preview
    location = / {
        # WhatsApp and social bots
        if ($http_user_agent ~* "WhatsApp") {
            return 301 /preview;
        }
        if ($http_user_agent ~* "facebookexternalhit") {
            return 301 /preview;
        }
        if ($http_user_agent ~* "TwitterBot") {
            return 301 /preview;
        }
        if ($http_user_agent ~* "TelegramBot") {
            return 301 /preview;
        }
        
        # Serve SPA for humans
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Preview endpoint -OG meta tags for bots
    location /preview {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bot-Detected "true";
    }

    # Login/Admin - serve SPA
    location /login {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /admin {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /dashboard {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /order-status {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # JS files - sem cache para evitar problema de chunk desatualizado
    location ~* \.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}