server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Preview para bots - retorna HTML com OG tags (deve vir primeiro)
    location ^~ /preview {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect bots from root to /preview
    location = / {
        set $is_bot "0";
        
        if ($http_user_agent ~* "(WhatsApp|facebookexternalhit|TwitterBot|TelegramBot)") {
            set $is_bot "1";
        }

        if ($is_bot = "1") {
            set $slug "";
            if ($host ~ "^([a-zA-Z0-9-]+)\.towersfy\.com$") {
                set $slug $1;
            }
            return 301 https://$host/preview/$slug;
        }

        try_files $uri $uri/ /index.html;
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API
    location /api/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}