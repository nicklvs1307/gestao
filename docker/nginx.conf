server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Bot detection - detecta e faz proxy para preview mantendo a URL original
    set $is_bot "0";
    if ($http_user_agent ~* "WhatsApp") { set $is_bot "1"; }
    if ($http_user_agent ~* "facebookexternalhit") { set $is_bot "1"; }
    if ($http_user_agent ~* "TwitterBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "TelegramBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "Slackbot") { set $is_bot "1"; }
    if ($http_user_agent ~* "LinkedInBot") { set $is_bot "1"; }
    if ($http_user_agent ~* "Discordbot") { set $is_bot "1"; }

    # Root path - detecta bot e faz proxy para preview, senão serve SPA
    location = / {
        # Se for bot, proxies para /preview no backend (mantendo a URL original)
        if ($is_bot = "1") {
            # Faz proxy para /preview no backend, preservando o path original
            rewrite ^ /preview break;
            proxy_pass https://apikicardapio.towersfy.com;
            proxy_ssl_server_name on;
            proxy_set_header Host apikicardapio.towersfy.com;
            # Passa o hostname original para o backend detectar o subdomínio
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Bot-Detected "true";
            break;
        }
        
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Explicit preview endpoint for testing (WhatsApp, etc)
    location /preview {
        proxy_pass https://apikicardapio.towersfy.com;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bot-Detected "true";
    }

    # API
    location /api/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}