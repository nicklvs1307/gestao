server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Bot detection - map blocks no server level (allowed in nginx)
    map $http_user_agent $is_bot {
        default 0;
        ~*(WhatsApp|facebookexternalhit|TwitterBot|TelegramBot|Slackbot|LinkedInBot|Discordbot|Googlebot|baiduspider|yandex|sogou|bingbot|core) 1;
    }

    # Extract tenant slug from hostname (ex: nomeloja.dominio.com -> nomeloja)
    map $host $tenant_slug {
        default "";
        ~^([a-zA-Z0-9-]+)\.([a-z0-9.-]+)$ $1;
    }

    # Root path - bots go to preview, humans use SPA
    location = / {
        # Bot detected - rewrite to /preview and let the ^~ location handle it
        if ($is_bot = "1") {
            rewrite ^ /preview/$tenant_slug break;
        }
        # Human user - serve React SPA
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Preview para bots - OG tags server-side
    location ^~ /preview {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}