server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Redirect bots from root to /preview
    location = / {
        set $is_bot "0";
        set $tenant_slug "";

        # Check if bot
        if ($http_user_agent ~* "(WhatsApp|facebookexternalhit|TwitterBot|TelegramBot)") {
            set $is_bot "1";
        }

        # Extract slug from hostname
        if ($host ~ "^([a-zA-Z0-9-]+)\.towersfy\.com$") {
            set $tenant_slug $1;
        }

        # Redirect bot
        if ($is_bot = "1") {
            rewrite ^ https://$host/preview/$tenant_slug permanent;
        }

        try_files $uri $uri/ /index.html;
    }

    # Preview para bots - retorna HTML com OG tags
    location ^~ /preview {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location /socket.io/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}