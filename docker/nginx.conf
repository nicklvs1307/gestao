server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Root path 
    location = / {
        # Check if bot and redirect to preview
        set $test_bot "0";
        if ($http_user_agent ~* "WhatsApp") { set $test_bot "1"; }
        if ($http_user_agent ~* "facebookexternalhit") { set $test_bot "1"; }
        if ($http_user_agent ~* "TwitterBot") { set $test_bot "1"; }
        
        # Log for debugging (check container logs)
        
        if ($test_bot = "1") {
            rewrite ^ /preview permanent;
        }
        
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Preview para bots
    location /preview {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads
    location /uploads/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host apikicardapio.towersfy.com;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Socket.IO
    location /socket.io/ {
        set $backend_upstream https://apikicardapio.towersfy.com;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host apikicardapio.towersfy.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}